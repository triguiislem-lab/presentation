<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDSS Pipeline — Démonstration Interactive</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060912;--surface:#0c1220;--card:#111827;--card2:#161f30;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#f0f4ff;--muted:#5a6a8a;--dim:#8898b0;
  --teal:#00e5b8;--blue:#4da6ff;--amber:#ffb347;--red:#ff6b6b;--purple:#a78bfa;
  --font:'Space Grotesk',sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}

/* ══════ LAYOUT ══════ */
.app{display:grid;grid-template-rows:56px 1fr 90px;height:100vh}

/* ══════ TOP BAR ══════ */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;border-bottom:1px solid var(--border);background:rgba(6,9,18,.9);backdrop-filter:blur(12px);z-index:10}
.logo{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,229,184,.4)}50%{box-shadow:0 0 0 6px rgba(0,229,184,0)}}
.step-counter{font-family:var(--mono);font-size:12px;color:var(--muted)}
.step-counter span{color:var(--text);font-weight:500}
.topbar-right{display:flex;align-items:center;gap:12px}
.speed-btn{font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:5px;border:1px solid var(--border2);background:none;color:var(--dim);cursor:pointer;transition:all .15s}
.speed-btn.active,.speed-btn:hover{border-color:var(--teal);color:var(--teal)}

/* ══════ MAIN STAGE ══════ */
.stage{display:grid;grid-template-columns:260px 1fr 300px;height:100%;overflow:hidden}

/* ══════ LEFT: PIPELINE NAV ══════ */
.pipeline-nav{border-right:1px solid var(--border);overflow-y:auto;padding:16px 0;scrollbar-width:none}
.pipeline-nav::-webkit-scrollbar{display:none}
.nav-group-label{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:12px 20px 6px;display:flex;align-items:center;gap:8px}
.nav-group-label::after{content:'';flex:1;height:1px;background:var(--border)}
.nav-item{display:flex;align-items:center;gap:12px;padding:9px 20px;cursor:pointer;transition:all .15s;position:relative;border-left:2px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.03)}
.nav-item.active{background:rgba(0,229,184,.05);border-left-color:var(--step-c,var(--teal))}
.nav-dot{width:24px;height:24px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;color:var(--muted);flex-shrink:0;transition:all .2s}
.nav-item.active .nav-dot{background:var(--step-c,var(--teal));border-color:var(--step-c,var(--teal));color:#000;font-weight:600}
.nav-item.done .nav-dot{background:rgba(0,229,184,.15);border-color:rgba(0,229,184,.3);color:var(--teal)}
.nav-item.done .nav-dot::after{content:'✓';font-size:10px}
.nav-item.done .nav-dot span{display:none}
.nav-text{flex:1;min-width:0}
.nav-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-sub{font-size:10px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-connector{width:1px;height:10px;background:var(--border2);margin:1px 0 1px 31px}

/* ══════ CENTER: MAIN CONTENT ══════ */
.main-content{overflow-y:auto;padding:32px 36px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.scene{display:none;opacity:0;transform:translateY(12px);transition:opacity .4s ease,transform .4s ease}
.scene.active{display:block;opacity:1;transform:none}

.scene-header{margin-bottom:28px}
.scene-phase{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.phase-pill{padding:3px 10px;border-radius:20px;font-size:10px;border:1px solid;font-family:var(--mono);letter-spacing:.06em}
.scene-title{font-size:22px;font-weight:700;letter-spacing:-.03em;line-height:1.2;margin-bottom:8px}
.scene-desc{font-size:13px;color:var(--dim);line-height:1.6;max-width:540px}

/* DATA FLOW CARD */
.flow-card{background:var(--card);border:1px solid var(--border2);border-radius:14px;overflow:hidden;margin-bottom:20px}
.flow-card-header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--card2)}
.flow-card-label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:6px}
.dot-in{width:7px;height:7px;border-radius:50%;background:var(--muted)}
.dot-out{width:7px;height:7px;border-radius:50%;background:var(--teal)}
.dot-kg{background:var(--amber)}
.dot-red{background:var(--red)}
.flow-card-body{padding:16px 18px;font-family:var(--mono);font-size:12px;line-height:1.85}

/* TRANSFORM ARROW */
.transform-row{display:flex;align-items:center;gap:12px;margin:12px 0;padding:0 18px}
.transform-line{flex:1;height:1px;background:linear-gradient(to right,transparent,var(--border2),transparent)}
.transform-badge{display:flex;align-items:center;gap:8px;padding:6px 16px;border-radius:20px;font-family:var(--mono);font-size:11px;white-space:nowrap;border:1px solid}
.t-arrow-svg{flex-shrink:0}

/* TOKENS (NER highlighting) */
.tok{display:inline-block;padding:1px 5px;border-radius:4px;font-weight:500;margin:0 1px}
.tok-drug{background:rgba(77,166,255,.18);color:var(--blue)}
.tok-sym{background:rgba(255,179,71,.18);color:var(--amber)}
.tok-dose{background:rgba(167,139,250,.18);color:var(--purple)}
.tok-time{background:rgba(0,229,184,.15);color:var(--teal)}
.tok-intent{background:rgba(255,107,107,.18);color:var(--red)}

/* CODE LINES */
.cl{display:block;padding:1px 0;transition:all .3s}
.cl.fade-in{animation:lineFadeIn .3s ease both}
@keyframes lineFadeIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
.cl.hi-add{color:var(--teal);background:rgba(0,229,184,.07);border-radius:3px;padding:1px 5px}
.cl.hi-del{color:var(--red);text-decoration:line-through;opacity:.55}
.cl.hi-warn{color:var(--amber)}
.cl.hi-dim{color:var(--muted)}
.cl .k{color:var(--blue)}
.cl .v{color:var(--teal)}
.cl .w{color:var(--amber)}
.cl .r{color:var(--red)}
.cl .p{color:var(--purple)}
.cl .d{color:var(--muted)}

/* DUAL PANEL (before/after side by side) */
.dual{display:grid;grid-template-columns:1fr auto 1fr;gap:0;margin-bottom:20px;align-items:start}
.dual-arrow{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 12px;padding-top:36px;gap:4px}
.dual-arrow svg{opacity:.4}
.dual-arrow span{font-family:var(--mono);font-size:9px;color:var(--muted);writing-mode:vertical-rl;transform:rotate(180deg);letter-spacing:.08em}

/* KG GRAPH MINI */
.kg-viz{background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:20px;margin-bottom:20px}
.kg-node{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-family:var(--mono);font-size:11px;font-weight:500;border:1px solid;margin:4px}
.kg-node.drug{background:rgba(77,166,255,.1);border-color:rgba(77,166,255,.3);color:var(--blue)}
.kg-node.effect{background:rgba(255,179,71,.1);border-color:rgba(255,179,71,.3);color:var(--amber)}
.kg-node.severity{background:rgba(255,107,107,.1);border-color:rgba(255,107,107,.3);color:var(--red)}
.kg-node.guideline{background:rgba(0,229,184,.08);border-color:rgba(0,229,184,.2);color:var(--teal)}
.kg-edge{font-family:var(--mono);font-size:10px;color:var(--muted);padding:2px 8px;display:inline-flex;align-items:center;gap:4px}
.kg-edge::before,.kg-edge::after{content:'—';opacity:.4}
.kg-row{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin:6px 0}

/* SCORES */
.scores-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.score-card{background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:14px;text-align:center}
.score-val{font-family:var(--mono);font-size:22px;font-weight:700;margin-bottom:4px}
.score-lbl{font-size:11px;color:var(--muted);letter-spacing:.04em}
.score-bar{height:3px;border-radius:2px;margin-top:10px;overflow:hidden;background:var(--border2)}
.score-fill{height:100%;border-radius:2px;transition:width 1.2s ease}

/* DIALOGUE BLOCK */
.dialogue{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.msg{display:flex;gap:10px;align-items:flex-start}
.msg.doc{flex-direction:row-reverse}
.msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.msg.pat .msg-avatar{background:rgba(77,166,255,.2);color:var(--blue);border:1px solid rgba(77,166,255,.3)}
.msg.doc .msg-avatar{background:rgba(0,229,184,.15);color:var(--teal);border:1px solid rgba(0,229,184,.3)}
.msg-bubble{max-width:80%;padding:9px 14px;border-radius:12px;font-size:12.5px;line-height:1.55}
.msg.pat .msg-bubble{background:rgba(77,166,255,.08);border:1px solid rgba(77,166,255,.15);border-radius:4px 12px 12px 12px}
.msg.doc .msg-bubble{background:rgba(0,229,184,.06);border:1px solid rgba(0,229,184,.12);border-radius:12px 4px 12px 12px}
.msg-role{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.msg.pat .msg-role{color:var(--blue)}
.msg.doc .msg-role{color:var(--teal)}

/* FINAL RESPONSE */
.cdss-response{background:linear-gradient(135deg,rgba(0,229,184,.04) 0%,rgba(77,166,255,.04) 100%);border:1px solid rgba(0,229,184,.2);border-radius:14px;padding:20px;margin-bottom:20px}
.cdss-response-header{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.cdss-badge{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:4px;background:rgba(0,229,184,.12);border:1px solid rgba(0,229,184,.3);color:var(--teal)}
.cdss-field{margin-bottom:10px}
.cdss-field-label{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.cdss-field-val{font-size:13px;line-height:1.5}
.alert-box{background:rgba(255,179,71,.07);border:1px solid rgba(255,179,71,.25);border-radius:8px;padding:10px 14px;font-size:12.5px;color:var(--amber);margin-top:6px;display:flex;gap:8px;align-items:flex-start}

/* ══════ RIGHT: LIVE DATA TRACKER ══════ */
.right-panel{border-left:1px solid var(--border);overflow-y:auto;scrollbar-width:none;padding:16px}
.right-panel::-webkit-scrollbar{display:none}
.rp-title{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.data-obj{margin-bottom:14px}
.data-obj-label{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.data-obj-label::before{content:'';width:6px;height:6px;border-radius:2px;background:currentColor;opacity:.4}
.data-field{display:flex;gap:8px;align-items:baseline;padding:4px 0;border-bottom:1px solid var(--border);font-size:11.5px}
.data-field:last-child{border-bottom:none}
.df-key{font-family:var(--mono);color:var(--muted);flex-shrink:0;min-width:80px;font-size:10.5px}
.df-val{font-family:var(--mono);color:var(--dim);word-break:break-all;font-size:10.5px;transition:color .3s}
.df-val.new{color:var(--teal);animation:flashNew .6s ease}
@keyframes flashNew{0%{background:rgba(0,229,184,.2)}100%{background:transparent}}
.df-val.warn-val{color:var(--amber)}
.df-val.empty{color:var(--border2);font-style:italic}

/* ══════ BOTTOM CONTROLS ══════ */
.controls{border-top:1px solid var(--border);background:rgba(6,9,18,.95);backdrop-filter:blur(12px);display:flex;flex-direction:column;justify-content:center;padding:0 28px;gap:8px}
.progress-wrap{display:flex;align-items:center;gap:12px}
.progress-bar{flex:1;height:3px;background:var(--border2);border-radius:2px;cursor:pointer;position:relative;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--blue));border-radius:2px;transition:width .4s ease}
.progress-time{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}
.ctrl-row{display:flex;align-items:center;justify-content:space-between}
.ctrl-left{display:flex;align-items:center;gap:8px}
.ctrl-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);background:none;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.ctrl-btn:hover{border-color:var(--teal);color:var(--teal)}
.ctrl-btn.play{width:42px;height:42px;border-color:var(--teal);color:var(--teal);background:rgba(0,229,184,.08)}
.ctrl-btn.play:hover{background:rgba(0,229,184,.15)}
.ctrl-center{flex:1;text-align:center}
.step-pills{display:flex;gap:5px;justify-content:center;flex-wrap:wrap}
.step-pill{width:24px;height:4px;border-radius:2px;background:var(--border2);cursor:pointer;transition:all .2s}
.step-pill.done{background:rgba(0,229,184,.4)}
.step-pill.active{background:var(--teal);width:32px}
.ctrl-right{display:flex;align-items:center;gap:8px}
.autoplay-btn{font-family:var(--mono);font-size:11px;padding:6px 14px;border-radius:6px;border:1px solid var(--border2);background:none;color:var(--muted);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.autoplay-btn.on{border-color:var(--teal);color:var(--teal);background:rgba(0,229,184,.06)}
.autoplay-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.autoplay-btn.on .autoplay-dot{animation:pulse 1.5s ease-in-out infinite}

/* ══════ RESPONSIVE ══════ */
@media (max-width:1100px){
  .stage{grid-template-columns:220px 1fr}
  .right-panel{display:none}
}

@media (max-width:860px){
  html,body{overflow:auto}
  .app{height:auto;min-height:100vh;grid-template-rows:auto 1fr auto}

  .topbar{padding:10px 14px;gap:10px;flex-wrap:wrap;min-height:56px}
  .topbar-right{width:100%;justify-content:flex-end}

  .stage{display:flex;flex-direction:column;height:auto;overflow:visible}

  .pipeline-nav{
    border-right:none;
    border-bottom:1px solid var(--border);
    padding:10px 0;
    display:flex;
    overflow-x:auto;
    overflow-y:hidden;
    white-space:nowrap;
  }
  .nav-group-label,.nav-connector{display:none}
  .nav-item{min-width:220px;padding:10px 12px;border-left:none;border-bottom:2px solid transparent}
  .nav-item.active{border-left-color:transparent;border-bottom-color:var(--step-c,var(--teal))}

  .main-content{padding:18px 14px}
  .right-panel{display:block;border-left:none;border-top:1px solid var(--border);max-height:280px}

  .dual{grid-template-columns:1fr}
  .dual-arrow{display:none}
  .scores-grid{grid-template-columns:1fr}
  .msg-bubble{max-width:88%}

  .controls{padding:10px 14px;position:sticky;bottom:0}
  .ctrl-row{flex-wrap:wrap;gap:10px}
  .ctrl-left,.ctrl-center,.ctrl-right{width:100%}
  .ctrl-left,.ctrl-right{justify-content:center}
  .step-pills{justify-content:flex-start;overflow-x:auto;padding-bottom:4px}
  .step-pill{flex-shrink:0}
}

@media (max-width:560px){
  .scene-title{font-size:18px}
  .scene-desc{font-size:12px}
  .flow-card-body{font-size:11px;line-height:1.7}
  .autoplay-btn{padding:6px 10px}
  .ctrl-btn{width:34px;height:34px}
  .ctrl-btn.play{width:38px;height:38px}
  .nav-item{min-width:180px}
}
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo"><div class="logo-dot"></div>CDSS Pipeline Demo</div>
    <div class="step-counter">Étape <span id="ctr-cur">1</span> / <span id="ctr-tot">10</span></div>
    <div class="topbar-right">
      <button class="speed-btn active" onclick="setSpeed(1)" id="s1">1×</button>
      <button class="speed-btn" onclick="setSpeed(1.5)" id="s15">1.5×</button>
      <button class="speed-btn" onclick="setSpeed(2)" id="s2">2×</button>
    </div>
  </div>

  <!-- STAGE -->
  <div class="stage">

    <!-- LEFT PIPELINE NAV -->
    <nav class="pipeline-nav" id="pipeNav"></nav>

    <!-- CENTER CONTENT -->
    <div class="main-content" id="mainContent"></div>

    <!-- RIGHT DATA TRACKER -->
    <div class="right-panel">
      <div class="rp-title">État des données · live</div>
      <div id="liveData"></div>
    </div>

  </div>

  <!-- BOTTOM CONTROLS -->
  <div class="controls">
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar" onclick="handleProgressClick(event)">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-time" id="progressTime">0:00</div>
    </div>
    <div class="ctrl-row">
      <div class="ctrl-left">
        <button class="ctrl-btn" onclick="go(-1)" title="Précédent">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
        </button>
        <button class="ctrl-btn play" id="playBtn" onclick="togglePlay()">
          <svg id="playIcon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
        <button class="ctrl-btn" onclick="go(1)" title="Suivant">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
        </button>
      </div>
      <div class="ctrl-center"><div class="step-pills" id="stepPills"></div></div>
      <div class="ctrl-right">
        <button class="autoplay-btn" id="autoBtn" onclick="toggleAuto()"><div class="autoplay-dot"></div>Auto</button>
        <button class="ctrl-btn" onclick="restart()" title="Recommencer">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// STEP DEFINITIONS
// ════════════════════════════════════════════
const STEPS = [
  {
    id:'input', group:'Entrée', num:'00', stepColor:'#a78bfa', label:'Transcript brut', sub:'Dialogue non structuré',
    phase:'INPUT', phaseColor:'#a78bfa',
    title:'Entrée : Transcript Patient ↔ Médecin',
    desc:'Le système reçoit un bloc de texte brut issu d\'une consultation. Aucune structure, aucune annotation — juste le dialogue tel qu\'il s\'est déroulé.',
    liveKey:'input',
    render: () => `
      <div class="scene-header">
        <div class="scene-phase"><span class="phase-pill" style="color:#a78bfa;border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.07)">INPUT · Transcript brut</span></div>
        <div class="scene-title" style="color:#a78bfa">Transcript brut reçu</div>
        <div class="scene-desc">Le système reçoit un bloc de texte non structuré issu d'une consultation médicale réelle.</div>
      </div>
      <div class="dialogue" id="dlg"></div>
      <div class="flow-card">
        <div class="flow-card-header"><span class="flow-card-label"><span class="dot-in" style="background:#a78bfa"></span>raw_input.txt</span></div>
        <div class="flow-card-body"><span class="cl hi-dim">// Aucune structure · aucune annotation</span>
<span class="cl">Patient:depuis 3j  nausées+diarrhées!!  </span>
<span class="cl">Médecin:quel tt ?? Metf. 500mg 2x/j</span>
<span class="cl">Pt:normal?? dois je  arréter</span></div>
      </div>`,
    anim: async (delay) => {

        <div class="scene-title" style="color:#00e5b8">Réponse CDSS validée</div>

        <div class="cdss-field"><div class="cdss-field-label">decision</div><div class="cdss-field-val" style="color:var(--teal);font-weight:500">Ne PAS arrêter la Metformine sans avis médical.</div></div>

// ════════════════════════════════════════════
// LIVE DATA STATE
// ════════════════════════════════════════════
const LIVE_STATE = {

  input:   [{v:'dialogue médical',e:false},{v:'Patient ↔ Médecin',e:false},{v:'5 lignes',e:false}],
  step1:   [{v:'✓ nettoyé'},{v:'Metf.→Metformine'},{v:'FR détecté'}],

// ════════════════════════════════════════════
// PLAYER
// ════════════════════════════════════════════
let cur = 0, playing = false, autoPlay = false, timer = null, speedMult = 1, elapsed = 0, tickTimer = null;

const wait = (ms) => new Promise(r => setTimeout(r, Math.max(ms, 80)));

function setSpeed(s) {
  speedMult = s;
  document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('s'+String(s).replace('.',''))?.classList.add('active');
}

function delay(ms) { return () => ms / speedMult; }

async function goTo(idx) {
  if (idx < 0 || idx >= STEPS.length) return;
  cur = idx;
  const s = STEPS[cur];

  // Update nav
  document.querySelectorAll('.nav-item').forEach((el,i) => {
    el.classList.toggle('active', i===cur);
    el.classList.toggle('done', i<cur);
  });

  // Update counter
  document.getElementById('ctr-cur').textContent = cur+1;

  // Render content
  const mc = document.getElementById('mainContent');
  mc.querySelectorAll('.scene').forEach(e=>e.classList.remove('active'));
  let scene = mc.querySelector(`[data-sid="${s.id}"]`);
  if (!scene) {
    scene = document.createElement('div');
    scene.className = 'scene';
    scene.dataset.sid = s.id;
    scene.innerHTML = s.render();
    mc.appendChild(scene);
  }
  requestAnimationFrame(()=>scene.classList.add('active'));
  mc.scrollTop = 0;

  // Update live data
  updateLiveData(s.liveKey, cur);

  // Update pills and progress
  updatePills();
  updateProgress();

  // Run animation
  await s.anim(delay);
}

function updateLiveData(key, stepIdx) {
  const panel = document.getElementById('liveData');
  if (!panel) return;
  let html = '';
  const keys = Object.keys(LIVE_STATE);
  const visibleKeys = keys.slice(0, stepIdx+1);
  for (const k of visibleKeys) {
    const vals = LIVE_STATE[k];
    const newVals = LIVE_VALS[k];
    const stepDef = STEPS.find(s=>s.liveKey===k);
    const isActive = k === key;
    html += `<div class="data-obj"><div class="data-obj-label" style="color:${isActive?(stepDef?.stepColor||'var(--teal)'):'var(--muted)'}">${stepDef?.label||k}</div>`;
    for (let i=0; i<vals.length; i++) {
      const filled = newVals && newVals[i];
      html += `<div class="data-field"><span class="df-key">${vals[i].k}</span><span class="df-val${isActive&&filled?' new':''}${vals[i].e?' empty':''}">${filled?(filled.e?'[en attente]':filled.v):vals[i].v||'—'}</span></div>`;
    }
    html += '</div>';
  }
  panel.innerHTML = html;
}

function updatePills() {
  const pills = document.querySelectorAll('.step-pill');
  pills.forEach((p,i)=>{
    p.classList.toggle('active',i===cur);
    p.classList.toggle('done',i<cur);
  });
}

function updateProgress() {
  const pct = (cur/(STEPS.length-1))*100;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressTime').textContent = `${cur+1}/${STEPS.length}`;
}

function go(dir) {
  stopAuto();
  const next = cur + dir;
  if (next>=0 && next<STEPS.length) goTo(next);
}

function togglePlay() {
  playing = !playing;
  const icon = document.getElementById('playIcon');
  if (playing) {
    icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    autoPlay = true;
    document.getElementById('autoBtn').classList.add('on');
    startAutoPlay();
  } else {
    icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
    stopAuto();
  }
}

function toggleAuto() {
  autoPlay = !autoPlay;
  document.getElementById('autoBtn').classList.toggle('on', autoPlay);
  if (autoPlay) startAutoPlay();
  else stopAuto();
}

function startAutoPlay() {
  stopAuto();
  const interval = (4000 / speedMult);
  timer = setInterval(() => {
    if (cur < STEPS.length-1) goTo(cur+1);
    else { stopAuto(); playing=false; document.getElementById('playIcon').innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>'; }
  }, interval);
}

function stopAuto() {
  if (timer) { clearInterval(timer); timer=null; }
}

function restart() {
  stopAuto(); playing=false;
  document.getElementById('playIcon').innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>';
  document.getElementById('autoBtn').classList.remove('on');
  autoPlay=false;
  // Clear rendered scenes
  document.getElementById('mainContent').innerHTML='';
  goTo(0);
}

function handleProgressClick(e) {
  const bar = document.getElementById('progressBar');
  const rect = bar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const idx = Math.round(pct * (STEPS.length-1));
  stopAuto(); goTo(idx);
}

// ════════════════════════════════════════════
// BUILD NAV + PILLS
// ════════════════════════════════════════════
function buildNav() {
  const nav = document.getElementById('pipeNav');
  let lastGroup = '';
  STEPS.forEach((s, i) => {
    if (s.group !== lastGroup) {
      lastGroup = s.group;
      nav.innerHTML += `<div class="nav-group-label">${s.group}</div>`;
    }
    nav.innerHTML += `<div class="nav-item" data-ni="${i}" style="--step-c:${s.stepColor}" onclick="go(${i-cur});stopAuto()">
      <div class="nav-dot"><span>${s.num}</span></div>
      <div class="nav-text"><div class="nav-title">${s.label}</div><div class="nav-sub">${s.sub}</div></div>
    </div>`;
    if (i < STEPS.length-1) nav.innerHTML += `<div class="nav-connector"></div>`;
  });
  // Fix click handlers
  nav.querySelectorAll('.nav-item').forEach((el,i)=>el.onclick=()=>{stopAuto();playing=false;document.getElementById('playIcon').innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>';goTo(i)});
}

function buildPills() {
  const container = document.getElementById('stepPills');
  STEPS.forEach((_,i)=>{
    const p = document.createElement('div');
    p.className = 'step-pill';
    p.onclick = ()=>{stopAuto();goTo(i)};
    container.appendChild(p);
  });
  document.getElementById('ctr-tot').textContent = STEPS.length;
}

// INIT
buildNav();
buildPills();
goTo(0);
</script>
